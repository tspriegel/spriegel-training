<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E1013">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<title>Training Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#0E1013; --panel:#181C21; --panel-2:#20262D; --line:#2C333B;
    --steel:#8B96A2; --chalk:#EEF1F4; --pin:#F2B01E; --studio:#54BFF0;
    --done:#68C97F; --radius:14px; --pad:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--ink);color:var(--chalk);font-family:Inter,system-ui,-apple-system,sans-serif;
    font-size:15px;line-height:1.45;padding:0 0 100px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:520px;margin:0 auto;padding:0 var(--pad)}

  header{position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg,var(--ink) 72%,rgba(14,16,19,0));
    padding:calc(env(safe-area-inset-top) + 14px) 0 12px}
  .titlebar{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;letter-spacing:.10em;
    text-transform:uppercase;margin:0;line-height:1}
  .weeknav{display:flex;align-items:center;gap:2px}
  .weeknav button{background:none;border:0;color:var(--steel);font-size:18px;padding:4px 8px;cursor:pointer;border-radius:8px}
  .weeklabel{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--steel);min-width:96px;text-align:center}
  .strip{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px}
  .daybtn{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 0 7px;
    text-align:center;cursor:pointer;transition:border-color .15s,background .15s}
  .daybtn .dow{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:.10em;
    text-transform:uppercase;color:var(--steel);display:block}
  .daybtn .dnum{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;display:block;margin-top:2px}
  .daybtn .dot{width:5px;height:5px;border-radius:50%;margin:4px auto 0;background:transparent}
  .daybtn.lift .dot{background:var(--pin)}
  .daybtn.class .dot{background:var(--studio)}
  .daybtn.logged .dot{background:var(--done)}
  .daybtn.today{border-color:var(--steel)}
  .daybtn.sel{background:var(--panel-2);border-color:var(--chalk)}
  .daybtn.sel .dow{color:var(--chalk)}

  .dayhead{margin:22px 0 12px}
  .eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--steel)}
  .eyebrow.pin{color:var(--pin)} .eyebrow.studio{color:var(--studio)}
  h2{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:30px;letter-spacing:.03em;
    text-transform:uppercase;margin:2px 0 0;line-height:1.05}
  .sub{color:var(--steel);font-size:13px;margin-top:4px}

  /* per-day mode switch */
  .modes{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
  .mode{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 12px;
    text-align:left;cursor:pointer;color:var(--steel)}
  .mode .mt{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:15px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--chalk);display:block}
  .mode .ms{font-size:11px;margin-top:2px;display:block;font-family:'IBM Plex Mono',monospace}
  .mode.on[data-mode=lift]{border-color:var(--pin);background:rgba(242,176,30,.10)}
  .mode.on[data-mode=lift] .ms{color:var(--pin)}
  .mode.on[data-mode=class]{border-color:var(--studio);background:rgba(84,191,240,.10)}
  .mode.on[data-mode=class] .ms{color:var(--studio)}

  .picker{margin-top:12px}
  .pickhead{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--steel);margin-bottom:7px}
  .picks{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .pick{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:11px 12px 12px;text-align:left;cursor:pointer;color:var(--steel);overflow:hidden}
  .pick .pk{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:16px;
    letter-spacing:.08em;text-transform:uppercase;color:var(--chalk)}
  .pick .pl{display:block;font-size:10.5px;line-height:1.35;margin-top:3px;font-family:'IBM Plex Mono',monospace}
  .pick .pnext{display:none}
  .pick.on{border-color:var(--pin);background:rgba(242,176,30,.10)}
  .pick.on .pl{color:var(--pin)}
  .machine.oura svg{padding:2px}
  .oreadout{display:grid;grid-template-columns:repeat(auto-fit,minmax(64px,1fr));gap:8px}
  .ostat{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:8px 6px;text-align:center}
  .ostat b{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:19px;color:var(--pin);line-height:1}
  .ostat span{display:block;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--steel);margin-top:4px}
  .runbig{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;line-height:1;
    color:var(--pin);text-align:center}
  .runcard .badge.ok{background:rgba(104,201,127,.12);color:var(--done);border-color:rgba(104,201,127,.35)}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);margin-top:12px;overflow:hidden}
  .card.done{border-color:rgba(104,201,127,.45)}
  .cardtop{display:flex;gap:12px;padding:12px;align-items:flex-start}
  .machine{flex:0 0 84px;height:64px;background:var(--panel-2);border-radius:9px;display:flex;
    align-items:center;justify-content:center;overflow:hidden;cursor:pointer;position:relative;border:1px solid transparent}
  .machine:active{border-color:var(--pin)}
  .machine svg{width:100%;height:100%}
  .machine img{width:100%;height:100%;object-fit:cover}
  .machine .zoom{position:absolute;right:3px;bottom:3px;font-size:9px;color:var(--steel);
    font-family:'IBM Plex Mono',monospace;background:rgba(14,16,19,.7);border-radius:4px;padding:0 3px}
  .exmeta{flex:1;min-width:0;cursor:pointer}
  .exname{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:19px;letter-spacing:.04em;
    text-transform:uppercase;line-height:1.1}
  .precor{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--steel);margin-top:3px}
  .target{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--pin);margin-top:5px}
  .last{font-size:11.5px;color:var(--steel);margin-top:3px;font-family:'IBM Plex Mono',monospace}
  .badge{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;
    letter-spacing:.10em;text-transform:uppercase;background:rgba(242,176,30,.14);color:var(--pin);
    border:1px solid rgba(242,176,30,.35);padding:1px 6px;border-radius:5px;margin-top:6px}
  .stack{flex:0 0 26px;display:flex;flex-direction:column;align-items:center;padding-top:2px}
  .stack svg{width:26px;height:64px}
  .stackval{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--steel);margin-top:3px}

  .sets{border-top:1px solid var(--line);padding:10px 12px 12px;display:none}
  .card.open .sets{display:block}
  .setrow{display:grid;grid-template-columns:22px 1fr 1fr 34px;gap:8px;align-items:center;margin-bottom:8px}
  .setno{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--steel);text-align:center}
  .field{position:relative}
  .field label{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-family:'IBM Plex Mono',monospace;
    font-size:10px;color:var(--steel);pointer-events:none}
  input[type=number],input[type=text],input[type=time],textarea{width:100%;background:var(--panel-2);
    border:1px solid var(--line);color:var(--chalk);border-radius:9px;padding:11px 34px 11px 11px;
    font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;outline:none}
  input[type=text],textarea{padding-right:11px;font-family:Inter,sans-serif;font-weight:400}
  input:focus,textarea:focus{border-color:var(--pin)}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input[type=number]{-moz-appearance:textfield}
  .tick{width:34px;height:42px;border:1px solid var(--line);border-radius:9px;background:var(--panel-2);
    color:var(--steel);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .tick.on{background:rgba(104,201,127,.14);border-color:rgba(104,201,127,.5);color:var(--done)}
  .cue{font-size:12px;color:var(--steel);margin:2px 0 10px;line-height:1.4}
  .rowbtns{display:flex;gap:8px;margin-top:2px}

  button.btn{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:14px;letter-spacing:.10em;
    text-transform:uppercase;background:var(--panel-2);border:1px solid var(--line);color:var(--chalk);
    padding:11px 14px;border-radius:10px;cursor:pointer}
  button.btn:active{background:var(--line)}
  button.btn.primary{background:var(--pin);border-color:var(--pin);color:#1A1400}
  button.btn.studio{background:var(--studio);border-color:var(--studio);color:#00202E}
  button.btn.ghost{background:none}
  button.btn.wide{width:100%}
  button.btn.sm{padding:7px 10px;font-size:12px}

  .classcard .cardtop{align-items:center}
  .clock{flex:0 0 62px;text-align:center;font-family:'IBM Plex Mono',monospace}
  .clock .t{font-size:16px;font-weight:600;color:var(--studio)}
  .clock .m{font-size:10px;color:var(--steel)}
  .empty{border:1px dashed var(--line);border-radius:var(--radius);padding:20px 16px;margin-top:12px;
    text-align:center;color:var(--steel);font-size:13.5px}
  .empty b{display:block;color:var(--chalk);font-family:'Barlow Condensed',sans-serif;font-weight:600;
    letter-spacing:.08em;text-transform:uppercase;font-size:16px;margin-bottom:5px}

  .sheet{position:fixed;inset:0;z-index:40;background:rgba(8,9,11,.72);display:none;align-items:flex-end;justify-content:center}
  .sheet.on{display:flex}
  .sheetbody{width:100%;max-width:520px;background:var(--panel);border:1px solid var(--line);
    border-radius:18px 18px 0 0;padding:18px var(--pad) calc(env(safe-area-inset-bottom) + 22px);
    max-height:90vh;overflow:auto}
  .sheetbody h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;letter-spacing:.08em;
    text-transform:uppercase;margin:0 0 2px}
  .modelline{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--pin);margin-bottom:14px}
  .hero{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:6px;margin-bottom:6px}
  .hero svg{width:100%;height:auto;display:block}
  .hero img{width:100%;border-radius:8px;display:block}
  .shots{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .shot{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:4px}
  .shot svg{width:100%;height:auto;display:block}
  .shotcap{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--steel);text-align:center;padding:2px 0 3px}
  .steps{margin:0 0 12px;padding-left:18px;font-size:13.5px;color:var(--chalk)}
  .steps li{margin-bottom:5px}
  .steps li span{color:var(--steel)}
  .fieldrow{margin-bottom:12px}
  .fieldrow .lbl{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--steel);margin-bottom:5px}
  .note{font-size:12px;color:var(--steel);line-height:1.5;margin-top:8px}
  .note a{color:var(--studio)}
  .msg{font-size:12.5px;margin-top:10px;padding:10px;border-radius:9px;background:var(--panel-2);color:var(--steel);display:none}
  .msg.on{display:block} .msg.err{color:#F2907E} .msg.ok{color:var(--done)}
  .seg{display:flex;gap:6px;margin-bottom:14px}
  .seg button{flex:1}
  .seg button.on{background:var(--panel-2);border-color:var(--chalk);color:var(--chalk)}
  a.linkbtn{display:block;text-align:center;text-decoration:none}

  /* ---------- history ---------- */
  .tabs{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px}
  .tabs button{flex:1;background:none;border:0;color:var(--steel);cursor:pointer;border-radius:7px;padding:5px 10px;
    font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:.10em;text-transform:uppercase}
  .tabs button.on{background:var(--panel-2);color:var(--chalk)}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px}
  .stat .v{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:30px;line-height:1;letter-spacing:.02em}
  .stat .v small{font-size:13px;color:var(--steel);font-weight:600;margin-left:3px}
  .stat .k{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--steel);margin-top:6px;letter-spacing:.02em}
  .stat.pin .v{color:var(--pin)} .stat.studio .v{color:var(--studio)}
  .hsec{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--steel);margin:26px 0 8px}
  .panelbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 12px 10px}
  .panelbox svg{width:100%;height:auto;display:block}
  .legend{display:flex;gap:14px;margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--steel)}
  .legend i{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px}
  .exrow{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:10px 12px;margin-bottom:8px}
  .exrow .en{flex:1;min-width:0}
  .exrow .en b{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:15px;
    letter-spacing:.05em;text-transform:uppercase}
  .exrow .en span{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--steel)}
  .exrow .spark{flex:0 0 78px}
  .exrow .spark svg{width:78px;height:26px;display:block}
  .exrow .pr{flex:0 0 auto;text-align:right;font-family:'IBM Plex Mono',monospace}
  .exrow .pr b{display:block;font-size:14px;color:var(--chalk)}
  .exrow .pr span{font-size:10px;color:var(--done)}
  .exrow .pr span.flat{color:var(--steel)}
  .sess{display:flex;gap:10px;align-items:center;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:10px 12px;margin-bottom:8px}
  .sess .tag{flex:0 0 42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px}
  .sess .tag.lift{background:rgba(242,176,30,.12);color:var(--pin);border:1px solid rgba(242,176,30,.3)}
  .sess .tag.class{background:rgba(84,191,240,.12);color:var(--studio);border:1px solid rgba(84,191,240,.3)}
  .sess .sm{flex:1;min-width:0}
  .sess .sm b{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:15px;
    letter-spacing:.05em;text-transform:uppercase}
  .sess .sm span{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--steel)}
  .sess .go{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--steel)}

  .bar{position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:linear-gradient(0deg,var(--ink) 62%,rgba(14,16,19,0));
    padding:14px var(--pad) calc(env(safe-area-inset-bottom) + 14px)}
  .barin{max-width:520px;margin:0 auto;display:flex;gap:8px}
  .rest{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--pin);display:flex;
    align-items:center;justify-content:center;min-width:64px}
  hr.rule{border:0;border-top:1px solid var(--line);margin:22px 0 0}
  .foot{font-size:11.5px;color:var(--steel);margin-top:14px;line-height:1.5}
  @media (prefers-reduced-motion:no-preference){ .pinmark{transition:transform .35s cubic-bezier(.2,.8,.2,1)} }
</style>

<header>
  <div class="wrap">
    <div class="titlebar">
      <h1>Training</h1>
      <div class="tabs" id="tabs">
        <button data-view="week" class="on">Week</button>
        <button data-view="history">History</button>
      </div>
    </div>
    <div class="weeknav" id="weeknav" style="justify-content:flex-end;margin-top:8px">
      <button id="prev" aria-label="Previous week">‹</button>
      <span class="weeklabel" id="weeklabel"></span>
      <button id="next" aria-label="Next week">›</button>
    </div>
    <div class="strip" id="strip"></div>
  </div>
</header>

<main class="wrap" id="main"></main>
<div class="bar"><div class="barin" id="bar"></div></div>
<div class="sheet" id="sheet"><div class="sheetbody" id="sheetbody"></div></div>

<script>
/* ===================== STORAGE ===================== */
const KEY='training:v2';
const Store={
  async load(){
    try{ if(window.storage){ const r=await window.storage.get(KEY,false); return r&&r.value?JSON.parse(r.value):null; } }catch(e){}
    try{ const s=localStorage.getItem(KEY); return s?JSON.parse(s):null; }catch(e){ return null; }
  },
  async save(d){
    const s=JSON.stringify(d);
    try{ if(window.storage){ await window.storage.set(KEY,s,false); return; } }catch(e){}
    try{ localStorage.setItem(KEY,s); }catch(e){}
  }
};
let DB={logs:{},events:[],photos:{},settings:{unit:'lb'}};
let t_; function persist(){ clearTimeout(t_); t_=setTimeout(()=>Store.save(DB),250); }

/* ===================== MACHINE ART =====================
   Schematic drawings of the Precor pieces. Two views per machine:
   the side profile (spot it on the floor) and the setup position. */
const L='#8B96A2', A='#F2B01E', D='#39424C';
function sv(inner,w=180,h=130){
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" fill="none"
    stroke-linecap="round" stroke-linejoin="round"><g stroke="${L}" stroke-width="4">${inner}</g></svg>`;
}
/* shrouded selectorized weight stack — the Precor signature silhouette */
const shroud=(x,y=28,h=68)=>`<rect x="${x}" y="${y}" width="24" height="${h}" rx="4" fill="${D}" fill-opacity=".5"/>
  <path d="M${x+5} ${y+14}h14M${x+5} ${y+27}h14M${x+5} ${y+40}h14M${x+5} ${y+53}h14"/>
  <path d="M${x+12} ${y-12}v${12}"/>`;
const pin=(x,y)=>`<path d="M${x} ${y}h10" stroke="${A}" stroke-width="5"/>`;

const ART={
  legpress:{
    side: sv(`${shroud(14)}${pin(38,58)}<path d="M64 108h84"/><path d="M70 108V84l16-9"/>
      <path d="M86 75l18-11" stroke="${A}"/><path d="M104 64l24-14"/><path d="M126 46l20 12" stroke="${A}"/>
      <path d="M128 108V66"/><path d="M108 108V88"/>`),
    setup: sv(`<path d="M30 106h120"/><path d="M46 106V72"/><path d="M46 72l30-16"/>
      <path d="M76 56l22 6" stroke="${A}"/><path d="M98 62l26-18" stroke="${A}"/>
      <path d="M124 44v30"/><circle cx="60" cy="52" r="10"/><path d="M46 72l14-10"/>`)
  },
  chestpress:{
    side: sv(`${shroud(140)}${pin(128,60)}<path d="M28 108h72"/><path d="M46 108V72h30"/>
      <path d="M46 72V44"/><path d="M76 72V50" stroke="${A}"/><path d="M86 50h26" stroke="${A}"/>
      <path d="M112 50v52"/><path d="M100 108V50"/>`),
    setup: sv(`<path d="M40 108h96"/><path d="M58 108V64"/><path d="M58 64v-20"/>
      <circle cx="72" cy="40" r="10"/><path d="M64 62h22" stroke="${A}"/>
      <path d="M86 62h28" stroke="${A}"/><path d="M114 62V38"/><path d="M58 84h26"/>`)
  },
  latpulldown:{
    side: sv(`${shroud(140)}${pin(128,54)}<path d="M26 108h70"/><path d="M50 108V80h30"/>
      <path d="M50 80V56"/><path d="M64 22h68"/><path d="M84 22v22" stroke="${A}"/>
      <path d="M62 44h44" stroke="${A}"/><path d="M132 22v86"/>`),

function stackSVG(pct){
  const rows=10, top=6, h=5.6, gap=.9;
  const filled=Math.max(1,Math.min(rows,Math.round(pct*rows)));
  let plates='';
  for(let i=0;i<rows;i++){
    const y=top+i*(h+gap), on=i<filled;
    plates+=`<rect x="4" y="${y}" width="14" height="${h}" rx="1.4" fill="${on?'#39424C':'#20262D'}"
      stroke="${on?'#4B5661':'#2C333B'}" stroke-width="1"/>`;
  }
  const py=top+(filled-1)*(h+gap)+h/2;
  return `<svg viewBox="0 0 26 74" xmlns="http://www.w3.org/2000/svg">
    <rect x="10.4" y="0" width="1.6" height="${top}" fill="#4B5661"/>${plates}
    <g class="pinmark" transform="translate(0,${py-3.2})">
      <rect x="16" y="1.4" width="8" height="3.6" rx="1.8" fill="#F2B01E"/>
      <circle cx="17.6" cy="3.2" r="2.6" fill="#F2B01E"/></g></svg>`;
}

/* which mode is this day in? explicit choice wins; else the default template */
function modeOf(ds){
  const l=DB.logs[ds];
  if(l && l.mode) return l.mode;
  const dow=new Date(ds+'T12:00').getDay();
  return (dow===2||dow===4) ? 'lift' : 'class';
}
/* alternate A/B off the most recent individual session before this day */
function nextPlan(ds){
  const prior=Object.keys(DB.logs).filter(d=>d<ds && DB.logs[d].mode==='lift' && DB.logs[d].plan).sort();
  if(prior.length) return DB.logs[prior[prior.length-1]].plan==='A' ? 'B' : 'A';
  const dow=new Date(ds+'T12:00').getDay();
  return dow===4 ? 'B' : 'A';
}
function planOf(ds){
  const l=DB.logs[ds];
  if(l && l.mode==='lift' && l.plan) return l.plan;
  return nextPlan(ds);
}
function ensureLog(ds){
  const l=DB.logs[ds]||{};
  DB.logs[ds]=l;
  l.mode=l.mode||modeOf(ds);
  if(l.mode==='lift'){ l.plan=l.plan||nextPlan(ds); l.sets=l.sets||{}; }
  if(l.mode==='class'){ l.classes=l.classes||{}; }
  return l;
}
function setMode(ds,mode){
  const l=DB.logs[ds]||{}; DB.logs[ds]=l;
  l.mode=mode;

}

function sessionVolume(l){
  let v=0, sets=0, reps=0;
  Object.values(l.sets||{}).forEach(arr=>arr.forEach(s=>{
    if(s.w && s.r){ v += (+s.w)*(+s.r); sets++; reps += +s.r; }
  }));
  return {v,sets,reps};
}
function allSessions(){
  return Object.keys(DB.logs).filter(d=>{
    const l=DB.logs[d];
    if(l.mode==='lift') return sessionVolume(l).sets>0 || l.done || (l.run && +l.run.dist>0);
    if(l.mode==='class') return l.classes && Object.values(l.classes).some(c=>c.done);
    return false;
  }).sort().reverse();
}
function ouraTotals(){
  const hrs=[], kcal=[];
  Object.values(DB.logs).forEach(l=>{
    if(l.oura && l.oura.hr && l.oura.hr.avg) hrs.push(l.oura.hr.avg);
    const w=l.oura && (l.oura.workouts||[])[0];
    if(w && w.calories) kcal.push(w.calories);
  });
  return {
    n:hrs.length,
    avgHR: hrs.length ? Math.round(hrs.reduce((a,b)=>a+b,0)/hrs.length) : 0,
    kcal: kcal.reduce((a,b)=>a+b,0),
  };
}
function runTotals(){
  let dist=0, min=0, runs=0;
  Object.values(DB.logs).forEach(l=>{
    if(l.run && +l.run.dist>0){ dist+=+l.run.dist; min+=+l.run.min||0; runs++; }
  });
  return {dist,min,runs};
}
function classInfo(ds){

  const names=done.map(([uid])=>{ const e=DB.events.find(e=>e.uid===uid); return e?e.title:'Class'; });
  const mins=done.reduce((a,[,c])=>a+(+c.min||0),0);
  const rpe=done.map(([,c])=>+c.rpe).filter(Boolean);
  return {names,mins,rpe:rpe.length?(rpe.reduce((a,b)=>a+b,0)/rpe.length):0,count:done.length};
}
/* best top-set weight per session, per exercise — the progression series */
function series(exId){
  return Object.keys(DB.logs).filter(d=>DB.logs[d].sets && DB.logs[d].sets[exId]).sort()
    .map(d=>{
      const done=DB.logs[d].sets[exId].filter(s=>s.w && s.r);
      if(!done.length) return null;
      const top=done.reduce((a,b)=> (+b.w > +a.w ? b : a));
      const e1rm=Math.round((+top.w)*(1 + (+top.r)/30)); // Epley
      return {date:d, w:+top.w, r:+top.r, e1rm, vol:done.reduce((a,s)=>a+(+s.w)*(+s.r),0)};
    }).filter(Boolean);
}
function sparkline(pts){
  if(pts.length<2) return `<svg viewBox="0 0 78 26"><line x1="0" y1="20" x2="78" y2="20" stroke="#2C333B" stroke-width="2"/></svg>`;
  const vals=pts.map(p=>p.e1rm), min=Math.min(...vals), max=Math.max(...vals);
  const span=(max-min)||1;
  const x=i=>2+i*(74/(pts.length-1)), y=v=>23-((v-min)/span)*19;
  const d=vals.map((v,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(v).toFixed(1)}`).join(' ');
  const up=vals[vals.length-1]>=vals[0];
  const col=up?'#68C97F':'#8B96A2';
  return `<svg viewBox="0 0 78 26" fill="none">
    <path d="${d}" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${x(vals.length-1).toFixed(1)}" cy="${y(vals[vals.length-1]).toFixed(1)}" r="2.6" fill="${col}"/></svg>`;
}
function weekBuckets(n){
  const out=[];
  for(let i=n-1;i>=0;i--){
    const start=new Date(mondayOf(today)); start.setDate(start.getDate()-i*7);
    const end=new Date(start); end.setDate(end.getDate()+6); end.setHours(23,59,59);
    let vol=0, lifts=0, classes=0, mins=0;
    Object.keys(DB.logs).forEach(ds=>{
      const d=new Date(ds+'T12:00');
      if(d<start||d>end) return;
      const l=DB.logs[ds];
      if(l.mode==='lift'){ const s=sessionVolume(l); if(s.sets){ vol+=s.v; lifts++; } }
      if(l.mode==='class'){ const c=classInfo(ds); if(c.count){ classes+=c.count; mins+=c.mins; } }
    });
    out.push({start,vol,lifts,classes,mins,label:start.toLocaleDateString(undefined,{month:'numeric',day:'numeric'})});
  }
  return out;
}
function volumeChart(weeks){
  const W=480,H=150,pad=22;
  const max=Math.max(...weeks.map(w=>w.vol),1);
  const bw=(W-pad*2)/weeks.length;
  let bars='', labels='';
  weeks.forEach((w,i)=>{
    const h=Math.max(w.vol?4:0,(w.vol/max)*(H-46));
    const x=pad+i*bw+bw*0.18, y=H-24-h, ww=bw*0.64;
    bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${ww.toFixed(1)}" height="${h.toFixed(1)}" rx="3"
      fill="${w.vol?'#F2B01E':'#252B32'}" fill-opacity="${w.vol?'.85':'1'}"/>`;
    if(w.classes) bars+=`<circle cx="${(x+ww/2).toFixed(1)}" cy="${(H-14).toFixed(1)}" r="3" fill="#54BFF0"/>`;
    labels+=`<text x="${(x+ww/2).toFixed(1)}" y="${H-2}" fill="#8B96A2" font-size="8"
      font-family="IBM Plex Mono, monospace" text-anchor="middle">${w.label}</text>`;
  });
  const top=`<text x="${pad}" y="12" fill="#8B96A2" font-size="9" font-family="IBM Plex Mono, monospace">
    peak ${Math.round(max).toLocaleString()} ${DB.settings.unit}</text>`;
  return `<svg viewBox="0 0 ${W} ${H}">${top}
    <line x1="${pad}" y1="${H-24}" x2="${W-pad}" y2="${H-24}" stroke="#2C333B" stroke-width="1"/>
    ${bars}${labels}</svg>`;
}

    const a=document.createElement('a');

function renderLift(main, planKey){
  const l=ensureLog(selected);
  PLAN[planKey].ex.forEach(ex=>{
    l.sets[ex.id]=l.sets[ex.id]||Array.from({length:ex.sets},()=>({w:'',r:'',done:false}));
    const rows=l.sets[ex.id], prev=lastPerf(ex.id,selected);
    const card=document.createElement('div');
    card.className='card'+(rows.some(s=>s.done)?' done':'');

    const cur=+(rows.find(s=>s.w)?.w)||(prev?+prev.sets[0].w:0);
    const max=Math.max(topWeight(ex.id),cur,1);
    const pct=cur?Math.max(.1,Math.min(1,cur/max)):.1;
    let badge='';
    if(prev && prev.sets.length>=ex.sets && prev.sets.every(s=>+s.r>=ex.hi)) badge=`<span class="badge">Add weight</span>`;
    const photo=DB.photos[ex.m];

    card.innerHTML=`
      <div class="cardtop">
        <div class="machine">${photo?`<img src="${photo}" alt="">`:ART[ex.m].side}<span class="zoom">tap</span></div>
        <div class="exmeta">
          <div class="exname">${ex.n}</div>
          <div class="precor">${ex.p}</div>
          <div class="target">${ex.sets} × ${ex.lo}–${ex.hi} reps</div>
          ${prev?`<div class="last">Last: ${prev.sets.map(s=>`${s.w||'—'}×${s.r||'—'}`).join('  ')}</div>`
                :`<div class="last">No history yet — set a baseline</div>`}
          ${badge}
        </div>
        <div class="stack">${stackSVG(pct)}<div class="stackval">${cur?cur+' '+DB.settings.unit:'—'}</div></div>
      </div>
      <div class="sets"><div class="cue">${ex.c}</div></div>`;

    card.querySelector('.machine').onclick=e=>{ e.stopPropagation(); openMachine(ex); };
    card.querySelector('.exmeta').onclick=()=>card.classList.toggle('open');

    const setsEl=card.querySelector('.sets');
    rows.forEach((s,i)=>{
      const row=document.createElement('div');
      row.className='setrow';
      row.innerHTML=`<div class="setno">${i+1}</div>
        <div class="field"><input type="number" inputmode="decimal" value="${s.w}" placeholder="0"><label>${DB.settings.unit}</label></div>
        <div class="field"><input type="number" inputmode="numeric" value="${s.r}" placeholder="0"><label>reps</label></div>
        <button class="tick ${s.done?'on':''}">✓</button>`;
      const [wIn,rIn]=row.querySelectorAll('input');
      wIn.oninput=()=>{ s.w=wIn.value; persist(); };
      rIn.oninput=()=>{ s.r=rIn.value; persist(); };
      wIn.onblur=rIn.onblur=()=>refreshStack(card,ex);
      row.querySelector('.tick').onclick=e=>{
        s.done=!s.done;
        e.currentTarget.classList.toggle('on',s.done);
        card.classList.toggle('done',rows.some(x=>x.done));
        if(s.done && !s.w && prev){ s.w=prev.sets[Math.min(i,prev.sets.length-1)].w; wIn.value=s.w; }
        if(s.done && !l.startedAt) l.startedAt=new Date().toISOString();  // the clock starts here
        startRest(i<2 && ex.sets>2 ? 150 : 90);
        persist(); refreshStack(card,ex); renderStrip();
      };
      setsEl.appendChild(row);
    });
    const rb=document.createElement('div');
    rb.className='rowbtns';
    rb.innerHTML=`<button class="btn sm ghost" data-a="rep">Repeat last</button>
                  <button class="btn sm ghost" data-a="add">Add set</button>`;
    rb.querySelector('[data-a=rep]').onclick=()=>{
      if(!prev) return;
      rows.forEach((s,i)=>{ const src=prev.sets[Math.min(i,prev.sets.length-1)]; s.w=src.w; s.r=src.r; });
      persist(); renderDay();
    };
    rb.querySelector('[data-a=add]').onclick=()=>{ rows.push({w:'',r:'',done:false}); persist(); renderDay(); };
    setsEl.appendChild(rb);
    main.appendChild(card);
  });
  renderRun(main);
  renderOura(main);
}

function renderOura(main){

  card.innerHTML=`
    <div class="cardtop">

        <div class="precor">${ouraOn()?'connected':'not connected'}</div>
        <div class="last">${o

/* ---------- treadmill run, on both A and B ---------- */
function lastRun(ds){
  const days=Object.keys(DB.logs).filter(d=>d<ds && DB.logs[d].run && +DB.logs[d].run.dist>0).sort();
  return days.length ? Object.assign({date:days[days.length-1]}, DB.logs[days[days.length-1]].run) : null;
}
function paceOf(run){
  const dist=+run.dist, min=+run.min;
  if(!dist || !min) return '';
  const p=min/dist, m=Math.floor(p), s=Math.round((p-m)*60);
  return `${m}:${String(s).padStart(2,'0')} /${DB.settings.dist||'mi'}`;
}

function downscale(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const W=640, s=Math.min(1,W/img.width);
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*s); c.height=Math.round(img.height*s);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg',.72));
      };
      img.onerror=rej; img.src=r.result;
    };
    r.onerror=rej; r.readAsDataURL(file);
  });
}

/* Apple's servers don't send CORS headers, so a browser can't read a webcal feed
   directly. A relay fetches it server-side. If the app is deployed alongside one
   (Cloudflare Pages -> /ics, Netlify -> /.netlify/functions/ics) it's found
   automatically. A relay on another host can be pasted into settings instead. */
const RELAY_PATHS=['/ics','/.netlify/functions/ics'];
const relayBases=()=>{
  const custom=(DB.settings.proxy||'').trim();
  return custom ? [custom] : RELAY_PATHS;
};
const relayFor=(base,u)=> base + (base.includes('?')?'&':'?') + 'url=' + encodeURIComponent(u);

async function fetchICS(u){
  try{
    const r=await fetch(u);
    if(r.ok){ const t=await r.text(); if(/BEGIN:VCALENDAR/i.test(t)) return {text:t,via:'direct'}; }
  }catch(e){ /* expected — this is the CORS block */ }

  const bases=relayBases(), isCustom=!!(DB.settings.proxy||'').trim();
  let lastErr=null;
  for(const base of bases){
    let r;
    try{ r=await fetch(relayFor(base,u)); }
    catch(e){ lastErr='Couldn’t reach '+base+'.'; continue; }
    if(r.status===404){ lastErr='Nothing is serving '+base+' (404).'; continue; }
    const t=await r.text();
    if(!r.ok){ lastErr=`Relay said ${r.status}: ${t.slice(0,140)}`; continue; }
    if(!/BEGIN:VCALENDAR/i.test(t)){ lastErr='The relay answered, but that link didn’t return a calendar.'; continue; }
    if(!isCustom) DB.settings.relayPath=base;  // remember which one works
    return {text:t, via: isCustom?'relay':'built-in relay'};
  }
  throw new Error((lastErr||'No relay reachable.') +
    (isCustom ? ' Check the Relay URL.' : ' Deploy the relay with the app, or use Import .ics.'));
}
/* on launch, quietly re-pull the subscribed calendar so new bookings appear */
async function refreshCalendar(){
  const u=DB.settings.icsUrl;
  if(!u) return;
  try{
    const {text}=await fetchICS(u);
    const n=importICS(text);
    DB.settings.lastSync=new Date().toISOString();
    persist();
    if(n) render();
  }catch(e){ /* offline or no relay — saved bookings still show */ }
}

/* ===================== OURA =====================
   The relay holds the client secret and does the talking; the phone holds only
   the access token. Requires the app + functions deployed together. */
const ouraOn=()=> !!(DB.settings.oura && DB.settings.oura.a);
async function ouraPost(route, body){
  const r=await fetch(`/oura/${route}`,{
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
  });
  if(r.status===404) throw new Error('The Oura relay isn’t deployed with this app.');
  if(r.status===501) throw new Error(await r.text());
  const j=await r.json().catch(()=>({error:'Bad response from the relay.'}));
  if(!r.ok) throw new Error(j.error==='reauth' ? 'reauth' : (j.error||`Relay error ${r.status}`));
  return j;
}
async function ouraToken(){
  const o=DB.settings.oura;
  if(!o || !o.a) throw new Error('reauth');
  if(o.e && Date.now() > o.e - 60000){          // expiring within a minute — renew
    if(!o.r) throw new Error('reauth');
    const t=await ouraPost('refresh',{refresh:o.r});
    DB.settings.oura=t; persist();
    return t.a;
  }
  return o.a;
}
/* pull heart rate for the session window, plus the day's workouts and activity */
async function ouraPull(ds){
  const l=DB.logs[ds]; if(!l) return;
  const token=await ouraToken();
  const data=await ouraPost('session',{
    token, date:ds,
    start:l.startedAt||null,
    end:l.finishedAt||null,
  });
  l.oura=Object.assign({pulledAt:new Date().toISOString()}, data);
  persist();
  return l.oura;
}
function ouraConnect(){ window.location.href='/oura/start'; }
function ouraDisconnect(){ delete DB.settings.oura; persist(); render(); }
/* the callback hands tokens back in the URL fragment — read, store, wipe */
function ouraCatchCallback(){
  const m=/[#&]oura=([^&]+)/.exec(location.hash||'');
  if(!m) return;
  try{
    DB.settings.oura=JSON.parse(decodeURIComponent(m[1]));
    Store.save(DB);
  }catch(e){}
  history.replaceState(null,'',location.pathname+location.search);
}
const metresToMiles=m=> (m/1609.34).toFixed(2);

function flash(el,text,kind){ el.textContent=text; el.className='msg on '+(kind||''); }

function importICS(text){
  const lines=text.replace(/\r\n/g,'\n').replace(/\n[ \t]/g,'').split('\n');
  const evs=[]; let cur=null;
  lines.forEach(line=>{
    if(line.startsWith('BEGIN:VEVENT')) cur={};
    else if(line.startsWith('END:VEVENT')){ if(cur) evs.push(cur); cur=null; }
    else if(cur){
      const i=line.indexOf(':'); if(i<0) return;
      const name=line.slice(0,i).split(';')[0], val=line.slice(i+1);
      if(name==='SUMMARY') cur.title=val.replace(/\\,/g,',').replace(/\\n/g,' ').trim();
      if(name==='LOCATION') cur.loc=val.replace(/\\,/g,',').split(/[\n,]/)[0].trim();
      if(name==='DTSTART') cur.start=val.trim();
      if(name==='RRULE') cur.rrule=val.trim();
      if(name==='UID') cur.uid=val.trim();
    }
  });
  const have=new Set(DB.events.map(e=>e.uid));
  const from=new Date(today); from.setDate(from.getDate()-14);
  const to=new Date(today); to.setDate(to.getDate()+70);
  let added=0;
  evs.forEach(ev=>{
    if(!ev.start||!ev.title) return;
    const base=parseDT(ev.start); if(!base) return;
    const time=ev.start.length>8?`${ev.start.slice(9,11)}:${ev.start.slice(11,13)}`:'';
    const occ=[];
    if(ev.rrule&&/FREQ=WEEKLY/i.test(ev.rrule)){
      const m=/UNTIL=(\d{8})/i.exec(ev.rrule);
      const until=m?parseDT(m[1]):to;
      const iv=+((/INTERVAL=(\d+)/i.exec(ev.rrule)||[,1])[1])||1;
      const d=new Date(base);
      while(d<=to && d<=until && occ.length<60){
        if(d>=from) occ.push(new Date(d));
        d.setDate(d.getDate()+7*iv);
      }
    } else if(base>=from && base<=to) occ.push(base);
    occ.forEach(d=>{
      const uid=(ev.uid||ev.title)+iso(d);
      if(have.has(uid)) return;
      have.add(uid);
      DB.events.push({uid,title:ev.title,date:iso(d),time,loc:ev.loc||''});
      const l=DB.logs[iso(d)];
      if(!l||!l.mode) { DB.logs[iso(d)]=Object.assign(l||{},{mode:'class',classes:{}}); }
      added++;
    });
  });
  return added;
}
function parseDT(v){
  const m=/^(\d{4})(\d{2})(\d{2})/.exec(v); if(!m) return null;
  const d=new Date(+m[1],+m[2]-1,+m[3]); d.setHours(0,0,0,0); return d;
}
